name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Permissions (minimize attack surface) ─────────────────────
permissions:
  contents: read
  actions: read

jobs:
  # 1. Fast checks — fail fast
  fast-checks:
    name: Format, Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx prettier --check "src/**/*.{ts,tsx,css,json}" --ignore-path .gitignore
      - run: npm run lint
      - run: npx tsc --noEmit

  # 2. Unit tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx vitest run

  # 3. Security audit
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm audit --audit-level=high

  # 4. Production build (depends on all above)
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [fast-checks, test, audit]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7
